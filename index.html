<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتبة — واجهة محسّنة</title>
<meta name="description" content="واجهة مكتبة رقمية لاستيراد وعرض الكتب من ملفات Excel/CSV مع بحث، تخزين محلي، وتصدير JSON.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<!-- XLSX library is loaded on-demand to speed initial page load -->
<style>
/* ══════════════════════════════════════════
   THEME DEFINITIONS  (5 themes)
══════════════════════════════════════════ */

/* 1 — Galaxy Night (default dark) */
[data-theme="galaxy"] {
  --bg:      #0a0f1e;
  --surface: #111827;
  --card:    #161d2e;
  --card2:   #1e2740;
  --accent:  #6c63ff;
  --accentB: #a855f7;
  --accent2: #ff6b6b;
  --accent3: #43e97b;
  --text:    #e8eaf6;
  --text2:   #8892b0;
  --border:  rgba(108,99,255,.22);
  --glow:    0 0 22px rgba(108,99,255,.35);
  --hdr-bg:  linear-gradient(135deg,#0d1b3e,#1a0a2e,#0a1628);
  --btn-bg:  rgba(108,99,255,.13);
  --btn-border: rgba(108,99,255,.45);
  --title-grad: linear-gradient(90deg,#6c63ff,#ff6b6b,#43e97b);
  --ac0: linear-gradient(90deg,#6c63ff,#a855f7);
  --ac1: linear-gradient(90deg,#ff6b6b,#ff8e53);
  --ac2: linear-gradient(90deg,#43e97b,#38f9d7);
  --ac3: linear-gradient(90deg,#f093fb,#f5576c);
  --ac4: linear-gradient(90deg,#4facfe,#00f2fe);
}

/* 2 — Desert Parchment (light warm) */
[data-theme="parchment"] {
  --bg:      #f5efe0;
  --surface: #ede3cc;
  --card:    #faf4e8;
  --card2:   #f0e6d0;
  --accent:  #b5651d;
  --accentB: #d4843a;
  --accent2: #c0392b;
  --accent3: #27ae60;
  --text:    #2c1a0e;
  --text2:   #6b4c2a;
  --border:  rgba(181,101,29,.25);
  --glow:    0 0 18px rgba(181,101,29,.25);
  --hdr-bg:  linear-gradient(135deg,#d4a96a,#c17f3a,#b5651d);
  --btn-bg:  rgba(181,101,29,.12);
  --btn-border: rgba(181,101,29,.4);
  --title-grad: linear-gradient(90deg,#8B4513,#D2691E,#DAA520);
  --ac0: linear-gradient(90deg,#b5651d,#d4843a);
  --ac1: linear-gradient(90deg,#c0392b,#e74c3c);
  --ac2: linear-gradient(90deg,#27ae60,#2ecc71);
  --ac3: linear-gradient(90deg,#8e44ad,#9b59b6);
  --ac4: linear-gradient(90deg,#2980b9,#3498db);
}

/* 3 — Forest Green (dark green) */
[data-theme="forest"] {
  --bg:      #0b1a10;
  --surface: #112016;
  --card:    #162b1c;
  --card2:   #1d3825;
  --accent:  #4ade80;
  --accentB: #22c55e;
  --accent2: #f59e0b;
  --accent3: #38bdf8;
  --text:    #dcfce7;
  --text2:   #86efac;
  --border:  rgba(74,222,128,.2);
  --glow:    0 0 20px rgba(74,222,128,.3);
  --hdr-bg:  linear-gradient(135deg,#052e16,#14532d,#166534);
  --btn-bg:  rgba(74,222,128,.1);
  --btn-border: rgba(74,222,128,.4);
  --title-grad: linear-gradient(90deg,#4ade80,#a3e635,#86efac);
  --ac0: linear-gradient(90deg,#4ade80,#22c55e);
  --ac1: linear-gradient(90deg,#f59e0b,#f97316);
  --ac2: linear-gradient(90deg,#38bdf8,#0ea5e9);
  --ac3: linear-gradient(90deg,#a78bfa,#7c3aed);
  --ac4: linear-gradient(90deg,#fb7185,#f43f5e);
}

/* 4 — Midnight Ocean (dark blue) */
[data-theme="ocean"] {
  --bg:      #020b18;
  --surface: #051525;
  --card:    #071e35;
  --card2:   #0a2744;
  --accent:  #38bdf8;
  --accentB: #0ea5e9;
  --accent2: #f472b6;
  --accent3: #34d399;
  --text:    #e0f2fe;
  --text2:   #7dd3fc;
  --border:  rgba(56,189,248,.2);
  --glow:    0 0 22px rgba(56,189,248,.3);
  --hdr-bg:  linear-gradient(135deg,#012030,#023e5a,#01304a);
  --btn-bg:  rgba(56,189,248,.1);
  --btn-border: rgba(56,189,248,.4);
  --title-grad: linear-gradient(90deg,#38bdf8,#818cf8,#34d399);
  --ac0: linear-gradient(90deg,#38bdf8,#0ea5e9);
  --ac1: linear-gradient(90deg,#f472b6,#ec4899);
  --ac2: linear-gradient(90deg,#34d399,#10b981);
  --ac3: linear-gradient(90deg,#a78bfa,#8b5cf6);
  --ac4: linear-gradient(90deg,#fb923c,#f97316);
}

/* 5 — Rose Gold (light pink/gold) */
[data-theme="rose"] {
  --bg:      #fff1f2;
  --surface: #ffe4e6;
  --card:    #fff5f7;
  --card2:   #fecdd3;
  --accent:  #be185d;
  --accentB: #db2777;
  --accent2: #b45309;
  --accent3: #047857;
  --text:    #3b0a1a;
  --text2:   #9d174d;
  --border:  rgba(190,24,93,.2);
  --glow:    0 0 18px rgba(190,24,93,.2);
  --hdr-bg:  linear-gradient(135deg,#fbcfe8,#f9a8d4,#fda4af);
  --btn-bg:  rgba(190,24,93,.08);
  --btn-border: rgba(190,24,93,.35);
  --title-grad: linear-gradient(90deg,#be185d,#db2777,#f43f5e);
  --ac0: linear-gradient(90deg,#be185d,#db2777);
  --ac1: linear-gradient(90deg,#b45309,#d97706);
  --ac2: linear-gradient(90deg,#047857,#059669);
  --ac3: linear-gradient(90deg,#7c3aed,#8b5cf6);
  --ac4: linear-gradient(90deg,#1d4ed8,#3b82f6);
}

/* ══════════════════════════════════════════
   BASE STYLES
══════════════════════════════════════════ */
* { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family:'Cairo',sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height:100vh;
  display:flex; flex-direction:column;
  transition: background .4s, color .4s;
}

/* HEADER */
header {
  background: var(--hdr-bg);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  position: sticky; top:0; z-index:100;
  box-shadow: 0 4px 30px rgba(0,0,0,.4);
  transition: background .4s;
}
.header-inner {
  max-width:1400px; margin:0 auto;
  display:flex; flex-direction:column; align-items:center;
  padding:1.1rem 0 .9rem;
}
.lib-name {
  font-family:'Tajawal',sans-serif; font-size:2rem; font-weight:800;
  background: var(--title-grad);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  letter-spacing:2px; display:flex; align-items:center; gap:.5rem; margin-bottom:.7rem;
}
.lib-icon { font-size:1.8rem; }
.icon{width:1.45rem;height:1.45rem;display:inline-block;vertical-align:middle;fill:currentColor}
.search-bar { width:100%; max-width:680px; position:relative; }
.search-bar input {
  width:100%; background:rgba(255,255,255,.07);
  border:1.5px solid var(--border); border-radius:50px;
  padding:.7rem 3.2rem .7rem 1.4rem;
  color:var(--text); font-family:'Cairo',sans-serif; font-size:.95rem;
  outline:none; transition:all .3s; backdrop-filter:blur(8px);
}
.search-bar input::placeholder { color:var(--text2); }
.search-bar input:focus { border-color:var(--accent); box-shadow:var(--glow); background:rgba(255,255,255,.1); }
.search-icon { position:absolute; left:1.1rem; top:50%; transform:translateY(-50%); color:var(--text2); }

.mic-btn {
  position: absolute;
  left: 3rem;
  top: 50%;
  transform: translateY(-50%);
  background: transparent;
  border: none;
  color: var(--text2);
  cursor: pointer;
  font-size: 1.2rem;
  padding: 0.25rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.2s;
}
.mic-btn:hover { color: var(--accent); }
.mic-btn.active { color: #ef4444; animation: pulse 1.5s infinite; }
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
.search-bar .clear-btn{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:1rem;padding:.25rem;border-radius:8px;display:none}
.header-controls{display:flex;align-items:center;gap:.5rem;margin-top:.45rem}
.export-btn{background:transparent;border:1px solid transparent;padding:.35rem .55rem;border-radius:8px;color:var(--accent);cursor:pointer}
.export-btn:hover{background:var(--btn-bg);box-shadow:var(--glow)}

/* file status feedback */
.file-ok{color:var(--accent);background:transparent;padding:.28rem .6rem;border-radius:8px;font-size:.92rem;display:inline-block}
.file-loading{color:var(--text2);background:transparent;padding:.28rem .6rem;border-radius:8px;font-size:.92rem;display:inline-block}

/* MAIN */
main { flex:1; max-width:1400px; margin:0 auto; width:100%; padding:1.8rem 1.5rem; }
.top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.4rem; flex-wrap:wrap; gap:.7rem; }
.results-info { font-size:.88rem; color:var(--text2); }
.results-info span { color:var(--accent); font-weight:700; }

/* CARDS GRID — columns controlled by CSS variable */
.cards-grid {
  display:grid;
  grid-template-columns: repeat(var(--cols,3), 1fr);
  gap:1.3rem;
}
@media(max-width:900px){ .cards-grid { grid-template-columns: repeat(min(var(--cols,3),2), 1fr) !important; } }
@media(max-width:580px){ .cards-grid { grid-template-columns: 1fr !important; } }

.book-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:16px; padding:1.3rem;
  position:relative; overflow:hidden;
  transition:all .3s cubic-bezier(.4,0,.2,1);
}
.book-card::before {
  content:''; position:absolute; top:0; right:0; width:70px; height:70px;
  background:radial-gradient(circle,rgba(255,255,255,.06) 0%,transparent 70%);
  border-radius:0 16px 0 100%;
}
.book-card:hover { transform:translateY(-4px); border-color:var(--accent); box-shadow:var(--glow),0 8px 28px rgba(0,0,0,.25); }

.card-stripe { height:4px; border-radius:2px; margin-bottom:.85rem; }
.s0{background:var(--ac0)} .s1{background:var(--ac1)} .s2{background:var(--ac2)} .s3{background:var(--ac3)} .s4{background:var(--ac4)}

.book-title { font-family:'Tajawal',sans-serif; font-size:1.02rem; font-weight:700; color:var(--text); margin-bottom:.65rem; line-height:1.4; }
.book-field { display:flex; align-items:flex-start; gap:.35rem; font-size:.8rem; color:var(--text2); margin-bottom:.3rem; }
.book-field-label { color:var(--accent); font-weight:700; flex-shrink:0; }
.book-field-val { word-break:break-word; }

.dup-btn {
  display:inline-flex; align-items:center; gap:.3rem; margin-top:.7rem;
  background:var(--btn-bg); border:1px solid var(--accent); border-radius:20px;
  padding:.28rem .8rem; font-size:.76rem; color:var(--accent);
  cursor:pointer; transition:all .2s; font-family:'Cairo',sans-serif;
}
.dup-btn:hover { filter:brightness(1.2); }
.dup-badge {
  background:var(--accent); color:#fff; border-radius:50%;
  width:17px; height:17px; display:inline-flex; align-items:center; justify-content:center;
  font-size:.68rem; font-weight:700;
}

/* EMPTY */
.empty-state { text-align:center; padding:5rem 2rem; color:var(--text2); grid-column:1/-1; }
.empty-state .big-icon { font-size:5rem; opacity:.25; margin-bottom:1rem; }
.empty-state h2 { font-size:1.2rem; margin-bottom:.4rem; }

/* FOOTER */
footer {
  background:var(--surface); border-top:1px solid var(--border);
  padding:.6rem 2rem; display:flex; justify-content:center;
  transition:background .4s;
}
.settings-btn {
  display:flex; align-items:center; gap:.4rem;
  background:var(--btn-bg); border:1px solid var(--btn-border);
  color:var(--accent); border-radius:50px;
  padding:.38rem 1.1rem; font-family:'Cairo',sans-serif;
  font-size:.8rem; font-weight:700; cursor:pointer; transition:all .25s;
}
.settings-btn:hover { filter:brightness(1.15); box-shadow:var(--glow); }

/* MODALS */
.modal-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.78);
  backdrop-filter:blur(6px); z-index:999;
  align-items:center; justify-content:center; padding:1rem;
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--card); border:1px solid var(--border); border-radius:24px;
  width:100%; max-width:580px; max-height:90vh; overflow-y:auto;
  padding:2rem; position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,.5),var(--glow);
  transition:background .3s;
}
.modal-title { font-family:'Tajawal',sans-serif; font-size:1.35rem; font-weight:800; margin-bottom:1.4rem; display:flex; align-items:center; gap:.6rem; }
.modal-close {
  position:absolute; top:1.1rem; left:1.1rem;
  background:rgba(255,255,255,.07); border:none; color:var(--text2);
  border-radius:8px; padding:.38rem .65rem; cursor:pointer; font-size:.95rem; transition:all .2s;
}
.modal-close:hover { background:rgba(255,80,80,.2); color:var(--accent2); }

/* PASSWORD */
.pw-modal { max-width:340px; text-align:center; }
.pw-icon { font-size:2.8rem; margin-bottom:.6rem; }
.pw-title { font-family:'Tajawal',sans-serif; font-size:1.2rem; font-weight:800; margin-bottom:.3rem; }
.pw-sub { font-size:.83rem; color:var(--text2); margin-bottom:1.3rem; }
.pw-input {
  width:100%; background:rgba(255,255,255,.07); border:1.5px solid var(--border);
  border-radius:12px; padding:.75rem 1rem; color:var(--text);
  font-family:'Cairo',sans-serif; font-size:1.15rem; letter-spacing:6px;
  text-align:center; outline:none; transition:all .3s;
}
.pw-input:focus { border-color:var(--accent); box-shadow:var(--glow); }
.pw-input.shake { animation:shake .4s; border-color:var(--accent2); }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
.pw-err { color:var(--accent2); font-size:.8rem; margin-top:.5rem; min-height:1em; }
.pw-btn {
  width:100%; margin-top:.9rem;
  background:linear-gradient(135deg,var(--accent),var(--accentB));
  color:#fff; border:none; border-radius:12px; padding:.75rem;
  font-family:'Cairo',sans-serif; font-size:.95rem; font-weight:700; cursor:pointer;
}
.pw-btn:hover { opacity:.9; }

/* SETTINGS */
.stg-group { margin-bottom:1.3rem; }
.stg-label { font-size:.85rem; font-weight:700; color:var(--text2); margin-bottom:.5rem; display:flex; align-items:center; gap:.35rem; }
.stg-label .ico { color:var(--accent); }
.stg-input {
  width:100%; background:rgba(255,255,255,.06); border:1.5px solid var(--border);
  border-radius:10px; padding:.6rem .9rem; color:var(--text);
  font-family:'Cairo',sans-serif; font-size:.9rem; outline:none; transition:all .3s;
}
.stg-input:focus { border-color:var(--accent); box-shadow:var(--glow); }
.divider { border:none; border-top:1px solid var(--border); margin:1.1rem 0; }

/* Upload */
.upload-lbl {
  display:flex; align-items:center; gap:.8rem;
  background:rgba(255,255,255,.04); border:2px dashed var(--border);
  border-radius:14px; padding:1rem 1.3rem; cursor:pointer; transition:all .3s;
}
.upload-lbl:hover { border-color:var(--accent); background:rgba(255,255,255,.07); }
.upload-lbl input { display:none; }
.upload-ico { font-size:1.9rem; }
.upload-txt { font-size:.86rem; color:var(--text2); }
.upload-txt strong { display:block; color:var(--accent); font-size:.9rem; }
.file-ok {
  display:inline-flex; align-items:center; gap:.4rem;
  background:rgba(67,222,128,.1); border:1px solid rgba(67,222,128,.3);
  border-radius:8px; padding:.35rem .8rem; font-size:.8rem; color:var(--accent3); margin-top:.6rem;
}

/* Chips */
.chips { display:flex; flex-wrap:wrap; gap:.4rem; margin-top:.45rem; }
.chip {
  background:rgba(255,255,255,.05); border:1.5px solid var(--border);
  border-radius:50px; padding:.3rem .75rem; font-size:.78rem; color:var(--text2);
  cursor:pointer; transition:all .2s; user-select:none;
}
.chip.on { background:rgba(255,255,255,.1); border-color:var(--accent); color:var(--accent); }

/* Range */
.range-row { display:flex; align-items:center; gap:.9rem; }
input[type=range] { flex:1; accent-color:var(--accent); }
.range-val { background:var(--accent); color:#fff; border-radius:8px; padding:.18rem .55rem; font-size:.83rem; font-weight:700; min-width:34px; text-align:center; }

/* THEME PICKER */
.theme-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:.6rem; margin-top:.5rem; }
.theme-swatch {
  border-radius:12px; padding:.55rem .3rem; text-align:center; cursor:pointer;
  border:2.5px solid transparent; transition:all .25s; font-size:.72rem; font-weight:700;
}
.theme-swatch.active { border-color:var(--accent); transform:scale(1.06); }
.theme-swatch span { display:block; font-size:1.4rem; margin-bottom:.2rem; }

/* COLUMNS PICKER */
.cols-picker { display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.45rem; }
.col-opt {
  display:flex; align-items:center; justify-content:center; gap:.3rem;
  border:1.5px solid var(--border); border-radius:10px;
  padding:.4rem .9rem; cursor:pointer; font-size:.82rem; font-weight:700;
  color:var(--text2); background:rgba(255,255,255,.04); transition:all .2s;
  min-width:3rem;
}
.col-opt.on { border-color:var(--accent); color:var(--accent); background:rgba(255,255,255,.09); }

/* Save */
.save-btn {
  width:100%; background:linear-gradient(135deg,var(--accent),var(--accentB));
  color:#fff; border:none; border-radius:12px; padding:.8rem;
  font-family:'Cairo',sans-serif; font-size:.95rem; font-weight:700;
  cursor:pointer; transition:all .3s; margin-top:.4rem;
  box-shadow:0 4px 14px rgba(0,0,0,.2);
}
.save-btn:hover { opacity:.9; transform:translateY(-1px); }

/* DUP MODAL */
.dup-list { display:flex; flex-direction:column; gap:.7rem; margin-top:.7rem; }
.dup-item { background:var(--card2); border:1px solid var(--border); border-radius:12px; padding:.9rem; font-size:.83rem; }
.dup-num { font-size:.73rem; color:var(--accent); font-weight:700; margin-bottom:.35rem; }

@media(max-width:600px){
  .lib-name{font-size:1.4rem;} header{padding:0 1rem;}
  main{padding:1.1rem .8rem;} .modal{padding:1.3rem;}
  .theme-grid{grid-template-columns:repeat(3,1fr);}
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const SUPABASE_URL = "";
const SUPABASE_ANON_KEY = "";
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let allRows = [];
let headers = [];
let S = {
  libName: "مكتبتي",
  theme: "galaxy",
  cardsPerPage: 20,
  gridCols: 3,
  titleCol: 0,
  visibleCols: []
};

function applyTheme(t) {
  S.theme = t;
  document.body.className = "theme-" + t;
  document.querySelectorAll(".theme-btn").forEach(b => {
    const onclick = b.getAttribute("onclick") || "";
    b.classList.toggle("active", onclick.includes(t));
  });
  saveData();
}

function openPw() {
  document.getElementById("pwInput").value = "";
  document.getElementById("pwErr").textContent = "";
  document.getElementById("pwModal").classList.add("open");
  setTimeout(() => document.getElementById("pwInput").focus(), 150);
}

function closePw() { document.getElementById("pwModal").classList.remove("open"); }

function checkPw() {
  if (document.getElementById("pwInput").value === "123456") {
    closePw();
    openStg();
  } else {
    document.getElementById("pwErr").textContent = "كلمة المرور خاطئة";
    document.getElementById("pwInput").classList.add("shake");
    setTimeout(() => document.getElementById("pwInput").classList.remove("shake"), 400);
  }
}

function openStg() {
  const sel = document.getElementById("titleColSel");
  if (sel) {
    sel.innerHTML = "";
    headers.forEach((h, i) => {
      const opt = document.createElement("option");
      opt.value = i; opt.textContent = h;
      if (i === S.titleCol) opt.selected = true;
      sel.appendChild(opt);
    });
  }
  document.getElementById("libNameIn").value = S.libName;
  document.getElementById("cppRange").value = S.cardsPerPage;
  document.getElementById("cppVal").textContent = S.cardsPerPage;
  document.getElementById("gridColsRange").value = S.gridCols;
  document.getElementById("gridColsVal").textContent = S.gridCols;
  
  buildColsUI();
  document.getElementById("stgModal").classList.add("open");
}

function closeStg() { document.getElementById("stgModal").classList.remove("open"); }

function applyStg() {
  S.libName = document.getElementById("libNameIn").value.trim() || "مكتبتي";
  S.cardsPerPage = parseInt(document.getElementById("cppRange").value);
  S.gridCols = parseInt(document.getElementById("gridColsRange").value);
  const sel = document.getElementById("titleColSel");
  if (sel) S.titleCol = parseInt(sel.value);
  
  const checks = document.querySelectorAll(".col-check:checked");
  S.visibleCols = Array.from(checks).map(c => parseInt(c.value));
  
  document.getElementById("libNameDisplay").textContent = S.libName;
  document.getElementById("cardsGrid").style.setProperty("--cols", S.gridCols);
  
  saveData();
  renderCards();
  closeStg();
}

async function saveData() {
  localStorage.setItem("library_data_v1", JSON.stringify({ rows: allRows, headers: headers, settings: S }));
  await syncToSupabase();
}

async function syncToSupabase() {
  try {
    const { error } = await _supabase
      .from("library_data")
      .upsert({ 
        id: 1, 
        content: { rows: allRows, headers: headers, settings: S },
        updated_at: new Date().toISOString()
      });
    if (error) throw error;
    showToast("✅ تم الحفظ سحابياً");
  } catch (e) {
    console.error("Sync failed", e);
  }
}

async function loadData() {
  const local = localStorage.getItem("library_data_v1");
  if (local) {
    try {
      const obj = JSON.parse(local);
      allRows = obj.rows || [];
      headers = obj.headers || [];
      S = Object.assign(S, obj.settings || {});
      renderCards();
    } catch(e) { console.error("Local load failed", e); }
  }
  
  try {
    const { data, error } = await _supabase.from("library_data").select("content").eq("id", 1).single();
    if (data && data.content) {
      const obj = data.content;
      allRows = obj.rows || [];
      headers = obj.headers || [];
      S = Object.assign(S, obj.settings || {});
      renderCards();
      const statusEl = document.getElementById("fileStatus");
      if (statusEl) statusEl.innerHTML = `<div class="file-ok">☁️ تم المزامنة: ${allRows.length} سجل</div>`;
    }
  } catch (e) { console.error("Load failed", e); }
}

function showToast(msg) {
  const t = document.createElement("div");
  t.style = "position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,255,0,0.8);color:#000;padding:10px 20px;border-radius:20px;z-index:9999;font-weight:bold;";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

async function handleFile(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    const data = new Uint8Array(e.target.result);
    const wb = XLSX.read(data, {type:"array"});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(ws, {header:1});
    if(json.length > 0) {
      headers = json[0];
      allRows = json.slice(1).map(row => {
        let obj = {};
        headers.forEach((h, i) => obj[h] = row[i]);
        return obj;
      });
      S.visibleCols = headers.slice(0, 6).map((_, i) => i);
      saveData();
      renderCards();
    }
  };
  reader.readAsArrayBuffer(file);
}

function renderCards(query = "") {
  const grid = document.getElementById("cardsGrid");
  if (!grid) return;
  grid.innerHTML = "";
  const filtered = allRows.filter(row => 
    Object.values(row).some(v => String(v).toLowerCase().includes(query.toLowerCase()))
  );
  
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state"><h2>لا توجد نتائج</h2></div>';
    return;
  }
  
  filtered.forEach(row => {
    const card = document.createElement("div");
    card.className = "card";
    let html = `<div class="card-title">${row[headers[S.titleCol]] || "بدون عنوان"}</div>`;
    S.visibleCols.forEach(idx => {
      if (idx !== S.titleCol) {
        html += `<div class="card-item"><span class="label">${headers[idx]}:</span> ${row[headers[idx]] || "-"}</div>`;
      }
    });
    card.innerHTML = html;
    grid.appendChild(card);
  });
}

function buildColsUI() {
  const container = document.getElementById("colsList");
  if (!container) return;
  container.innerHTML = "";
  headers.forEach((h, i) => {
    const div = document.createElement("div");
    div.className = "col-item";
    div.innerHTML = `<label><input type="checkbox" class="col-check" value="${i}" ${S.visibleCols.includes(i) ? "checked" : ""}> ${h}</label>`;
    container.appendChild(div);
  });
}

async function clearStoredData() {
  if(!confirm("هل أنت متأكد من حذف جميع البيانات نهائياً من المتصفح والسحابة؟")) return;
  try {
    await _supabase.from("library_data").delete().eq("id", 1);
    localStorage.removeItem("library_data_v1");
    location.reload();
  } catch (e) { alert("فشل الحذف: " + e.message); }
}

document.addEventListener("DOMContentLoaded", () => {
  loadData();
  const si = document.getElementById("searchInput");
  if (si) si.addEventListener("input", (e) => renderCards(e.target.value));
  
  const micBtn = document.getElementById("micBtn");
  if (micBtn && (window.SpeechRecognition || window.webkitSpeechRecognition)) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = "ar-SA";
    recognition.onresult = (e) => {
      const t = e.results[0][0].transcript;
      if (si) { si.value = t; renderCards(t); }
    };
    micBtn.onclick = () => recognition.start();
  }
  
  const clearBtn = document.getElementById("clearDataBtn");
  if (clearBtn) clearBtn.onclick = clearStoredData;
});
</script>
</body>
